apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
  namespace: resume-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: consumer
  template:
    metadata:
      labels:
        app: consumer
    spec:
      containers:
        - name: consumer
          image: consumer:local
          imagePullPolicy: IfNotPresent
          env:
            - name: RABBITMQ_HOST
              value: rabbitmq
            - name: RABBITMQ_QUEUE
              value: resume.events
            - name: ASPNETCORE_URLS
              value: http://+:8080
          ports:
            - containerPort: 8080

